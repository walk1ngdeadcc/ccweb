<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工程师的像素桌面 | Pixel Engineer Desk</title>
  <meta name="description" content="一个游戏化的个人技术博客，在像素桌面上探索教程文章和项目">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧑‍💻</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 桌面场景 -->
  <div class="desktop" id="desktop">
    <!-- 工程师角色 -->
    <div class="character" id="character">
      <div class="char-sprite" id="charSprite">🧑‍💻</div>
      <div class="char-name">Engineer</div>
    </div>

    <!-- 物品由 JS 动态生成 -->
    <div class="items-layer" id="itemsLayer"></div>

    <!-- 底部 HUD -->
    <div class="hud" id="hud">
      <div class="hud-line">
        <span class="hud-key">WASD</span> 移动 &nbsp;
        <span class="hud-key">SPACE</span> 打开物品 &nbsp;
        <span class="hud-key">鼠标</span> 拖拽/点击
      </div>
      <div class="hud-status" id="hudStatus">等待指令...</div>
    </div>

    <!-- 开机启动画面 -->
    <div class="boot-screen" id="bootScreen">
      <div class="boot-text">
        <div class="boot-line">BIOS DATE 05/20/25 14:22:51 VER 1.0.4</div>
        <div class="boot-line">CPU: Pixel-Engine x64 @ 3.6GHz</div>
        <div class="boot-line">RAM: 640K OK</div>
        <div class="boot-line">GPU: CRT-Shader 2.0</div>
        <div class="boot-line">...</div>
        <div class="boot-line blink">正在加载桌面环境...</div>
      </div>
    </div>
  </div>

  <!-- CRT 覆盖效果 -->
  <div class="crt-overlay">
    <div class="scanlines"></div>
    <div class="crt-curve"></div>
    <div class="crt-flicker"></div>
    <div class="crt-chromatic"></div>
  </div>

  <!-- 弹窗遮罩 -->
  <div class="window-overlay" id="windowOverlay" onclick="maybeCloseWindow(event)">
    <!-- 终端窗口 -->
    <div class="terminal-window" id="terminalWindow" onclick="event.stopPropagation()">
      <div class="window-header">
        <div class="window-dots">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
        </div>
        <span class="window-title" id="windowTitle">终端</span>
        <button class="window-close" onclick="closeWindow()">×</button>
      </div>
      <div class="window-content" id="windowContent"></div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/engine.js"></script>
</body>
</html>
